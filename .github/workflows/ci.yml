# CI vérif auto code est propre, passe les tests et est maintenable avant CD
# S'éxé à chaque push/PR sans déploy, secrets et modif d'env externes
---
name: CI Pipeline

# Déclencheurs
# Lance le workflow à chaque push sur main, develop et à chaque pull request
# vers main si PR change.
on:
  push:
    branches:
      - main
    # Ne lance pas la CI si on ne change que la config de déploiement
    paths-ignore:
      - "README.md"

  pull_request:
    branches:
      - main

# Annule les runs précédents sur la même branche si un nouveau push arrive
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Variables d'environnement globales
env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "2.2.1"

# Jobs
jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    # étapes du lint
    steps:
      # Clone le dépôt dans le runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Configure python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Installe les outils de lint
      - name: Install lint tool Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      # Erreurs affichées dans l'onglet "Annotations" du PR GitHub
      - name: Run Ruff Check (Linter + Imports)
        run: ruff check src/ tests/ --output-format=github

      - name: Run Ruff Format (Style)
        run: ruff format src/ tests/ --check

